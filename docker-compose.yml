services:
  jolto:
    build: .
    image: jolto-pipeline:latest
    container_name: jolto
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Force container-friendly defaults regardless of .env.
      HOST: "0.0.0.0"
      PORT: "8000"
    volumes:
      # Persist generated runs across container restarts. The history page
      # reads from this path, so every past run survives a redeploy.
      - ./runs:/app/runs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
